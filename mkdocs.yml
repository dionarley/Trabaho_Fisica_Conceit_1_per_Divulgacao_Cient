site_name: Isaac Newton - Física Conceitual I
site_url: https://dionarley.github.io/Trabaho_Fisica_Conceit_1_per_Divulgacao_Cient/
site_description: Trabalho acadêmico sobre Isaac Newton para a disciplina de Física Conceitual I na Unimontes
site_author: Amanda, Sara, Bernado, Miguel, Dionarley Ruas Vieira (+1 membro)

repo_url: https://github.com/dionarley/Trabaho_Fisica_Conceit_1_per_Divulgacao_Cient
repo_name: Trabalho Isaac Newton - Cartoon

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      toggle_name: Modo Escuro
      primary: indigo
      accent: indigo
    - scheme: slate
      toggle_name: Modo Claro
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link

nav:
  - Início: index.md
  - Sobre o Projeto:
      - Sobre: sobre.md
      - Proposta: proposta.md
  - Tutoriais:
      - Roteiro: tutorial-roteiro.md
      - Ilustração: tutorial-ilustracao.md
      - Orçamento: orcamento-planilha.md
  - Documentação:
      - Rascunhos: rascunhos.md
      - Referências: referencias.md
      - Cronograma: cronograma.md
      - Recursos: recursos.md
  - Como Contribuir: contribuindo.md
  - Licença: licenca.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search:
  - with-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      output_path: documento-isaac-newton.pdf
      verbose: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dionarley/Trabaho_Fisica_Conceit_1_per_Divulgacao_Cientifica
